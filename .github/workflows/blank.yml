name: Download and Process Files

on:
  schedule:
    - cron: '0 0 * * *'  # 每天运行一次
  workflow_dispatch:  # 允许手动触发

jobs:
  process-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许推送更改

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v3

      - name: 下载 Global_Compilation.txt
        run: |
          curl -L -o Global_Compilation.txt "https://raw.githubusercontent.com/siren202101/Global_Compilation/main/Global_Compilation.txt"

      - name: 读取链接并下载文件
        run: |
          mkdir -p downloaded_files
          while IFS= read -r url; do
            [ -n "$url" ] && curl -L "$url" >> downloaded_files/merged.txt && echo "" >> downloaded_files/merged.txt
          done < Global_Compilation.txt

      - name: 处理合并的文件
        run: |
          mkdir -p output
          grep '^DOMAIN-SUFFIX,' downloaded_files/merged.txt | sed 's/^DOMAIN-SUFFIX,//' | sort -u > output/processed.txt

      - name: 提交更改
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add output/processed.txt
          git commit -m "更新 processed.txt" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GG_TOKEN }}@github.com/siren202101/Global_Compilation.git HEAD:main
